<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Luma · Vendas com IA</title>
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #0d0d0f;
        --surface: #16161a;
        --border: #ffffff0f;
        --accent: #c8f135;
        --accent2: #7ef5c0;
        --text: #f0ede6;
        --muted: #8a877e;
        --user-bg: #1e1e24;
        --bot-bg: #161b12;
        --radius: 18px;
        --font-d: "DM Serif Display", serif;
        --font-s: "DM Sans", sans-serif;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-s);
        font-weight: 300;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        overflow-x: hidden;
      }

      /* grain overlay */
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.035'/%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* glow blob */
      .glow {
        position: fixed;
        width: 600px;
        height: 600px;
        border-radius: 50%;
        background: radial-gradient(circle, #c8f13512 0%, transparent 70%);
        top: -200px;
        left: 50%;
        transform: translateX(-50%);
        pointer-events: none;
        z-index: 0;
        animation: pulse 8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateX(-50%) scale(1);
          opacity: 0.6;
        }
        50% {
          transform: translateX(-50%) scale(1.15);
          opacity: 1;
        }
      }

      /* layout */
      .wrapper {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 720px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        padding: 0 16px;
      }

      /* header */
      header {
        display: flex;
        align-items: center;
        gap: 14px;
        padding: 28px 0 20px;
        border-bottom: 1px solid var(--border);
      }

      .avatar {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent2) 100%
        );
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 22px;
        flex-shrink: 0;
        box-shadow: 0 0 24px #c8f13530;
      }

      .header-text h1 {
        font-family: var(--font-d);
        font-size: 22px;
        font-weight: 400;
        letter-spacing: -0.3px;
        line-height: 1;
      }

      .header-text p {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
        letter-spacing: 0.4px;
      }

      .status-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        display: inline-block;
        margin-right: 5px;
        animation: blink 2.4s ease-in-out infinite;
      }

      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      /* messages */
      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 28px 0 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
        scrollbar-color: var(--border) transparent;
      }

      #messages::-webkit-scrollbar {
        width: 4px;
      }
      #messages::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 2px;
      }

      .msg {
        display: flex;
        gap: 10px;
        animation: fadeUp 0.35s ease both;
        max-width: 92%;
      }

      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .msg.user {
        align-self: flex-end;
        flex-direction: row-reverse;
      }
      .msg.bot {
        align-self: flex-start;
      }

      .msg-avatar {
        width: 32px;
        height: 32px;
        border-radius: 10px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15px;
        margin-top: 2px;
      }

      .msg.bot .msg-avatar {
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent2) 100%
        );
      }

      .msg.user .msg-avatar {
        background: var(--user-bg);
        border: 1px solid var(--border);
        font-size: 13px;
      }

      .bubble {
        padding: 13px 17px;
        border-radius: var(--radius);
        font-size: 14.5px;
        line-height: 1.65;
        letter-spacing: 0.1px;
        max-width: 560px;
      }

      .msg.bot .bubble {
        background: var(--bot-bg);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
        color: var(--text);
      }

      .msg.user .bubble {
        background: var(--user-bg);
        border: 1px solid #ffffff14;
        border-bottom-right-radius: 4px;
        color: var(--text);
      }

      /* typing indicator */
      .typing .bubble {
        display: flex;
        gap: 5px;
        align-items: center;
        padding: 16px 20px;
      }

      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--accent);
        animation: bounce 1.2s ease-in-out infinite;
      }
      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
          opacity: 0.4;
        }
        40% {
          transform: translateY(-6px);
          opacity: 1;
        }
      }

      /* input area */
      .input-area {
        padding: 16px 0 28px;
        border-top: 1px solid var(--border);
      }

      .input-row {
        display: flex;
        gap: 10px;
        align-items: flex-end;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 10px 10px 10px 18px;
        transition: border-color 0.2s;
      }

      .input-row:focus-within {
        border-color: #c8f13540;
      }

      #input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--text);
        font-family: var(--font-s);
        font-size: 14.5px;
        font-weight: 300;
        resize: none;
        max-height: 120px;
        line-height: 1.6;
        padding: 2px 0;
      }

      #input::placeholder {
        color: var(--muted);
      }

      #send {
        width: 40px;
        height: 40px;
        border-radius: 11px;
        background: var(--accent);
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition: all 0.2s;
      }

      #send:hover {
        background: #d9ff4d;
        transform: scale(1.05);
      }
      #send:active {
        transform: scale(0.96);
      }
      #send:disabled {
        opacity: 0.35;
        cursor: not-allowed;
        transform: none;
      }

      #send svg {
        width: 18px;
        height: 18px;
      }

      .hint {
        text-align: center;
        font-size: 11px;
        color: var(--muted);
        margin-top: 10px;
        letter-spacing: 0.3px;
      }

      /* suggestions */
      .suggestions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }

      .chip {
        background: var(--surface);
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: var(--font-s);
        font-size: 12px;
        padding: 7px 14px;
        border-radius: 100px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
      }

      .chip:hover {
        border-color: #c8f13550;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="wrapper">
      <header>
        <div class="avatar">✦</div>
        <div class="header-text">
          <h1>Luma</h1>
          <p>
            <span class="status-dot"></span>Consultora de vendas online com IA
          </p>
        </div>
      </header>

      <div id="messages"></div>

      <div class="input-area">
        <div class="suggestions" id="suggestions">
          <button class="chip" onclick="sendChip(this)">
            Quero começar a vender online
          </button>
          <button class="chip" onclick="sendChip(this)">
            Como usar IA no atendimento?
          </button>
          <button class="chip" onclick="sendChip(this)">
            Qual plataforma escolher?
          </button>
          <button class="chip" onclick="sendChip(this)">
            Criar conteúdo com IA
          </button>
        </div>
        <div class="input-row">
          <textarea
            id="input"
            rows="1"
            placeholder="Pergunte sobre vendas com IA…"
          ></textarea>
          <button id="send" onclick="sendMessage()" title="Enviar">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="#0d0d0f"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
        <p class="hint">Enter para enviar · Shift+Enter para nova linha</p>
      </div>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("send");
      const suggestEl = document.getElementById("suggestions");

      let history = [];
      let isLoading = false;

      // auto-resize textarea
      inputEl.addEventListener("input", () => {
        inputEl.style.height = "auto";
        inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + "px";
      });

      inputEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      function sendChip(btn) {
        inputEl.value = btn.textContent;
        suggestEl.style.display = "none";
        sendMessage();
      }

      function appendMessage(role, text) {
        const div = document.createElement("div");
        div.className = `msg ${role}`;

        const avatarDiv = document.createElement("div");
        avatarDiv.className = "msg-avatar";
        avatarDiv.textContent = role === "bot" ? "✦" : "👤";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = formatText(text);

        div.appendChild(avatarDiv);
        div.appendChild(bubble);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
        return div;
      }

      function formatText(text) {
        return text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
          .replace(/\*(.*?)\*/g, "<em>$1</em>")
          .replace(/^- (.+)/gm, "<li>$1</li>")
          .replace(
            /(<li>.*<\/li>)/s,
            '<ul style="padding-left:18px;margin:6px 0">$1</ul>',
          )
          .replace(/\n/g, "<br>");
      }

      function showTyping() {
        const div = document.createElement("div");
        div.className = "msg bot typing";
        div.id = "typing";
        const avatarDiv = document.createElement("div");
        avatarDiv.className = "msg-avatar";
        avatarDiv.textContent = "✦";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML =
          '<div class="dot"></div><div class="dot"></div><div class="dot"></div>';
        div.appendChild(avatarDiv);
        div.appendChild(bubble);
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function removeTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text || isLoading) return;

        suggestEl.style.display = "none";
        isLoading = true;
        sendBtn.disabled = true;
        inputEl.value = "";
        inputEl.style.height = "auto";

        appendMessage("user", text);
        history.push({ role: "user", content: text });
        showTyping();

        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ messages: history }),
          });
          const data = await res.json();
          removeTyping();

          if (!res.ok) {
            throw new Error(data.error || "Erro na API");
          }
          appendMessage("bot", data.reply);
          history.push({ role: "assistant", content: data.reply });
        } catch {
          removeTyping();
          appendMessage(
            "bot",
            "Ops, não consegui conectar ao servidor. Verifique se ele está rodando.",
          );
        }

        isLoading = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }

      // primeira mensagem automática
      window.addEventListener("DOMContentLoaded", async () => {
        showTyping();
        try {
          const res = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              messages: [{ role: "user", content: "olá" }],
            }),
          });
          const data = await res.json();
          removeTyping();
          const reply = data.reply || "Olá! Como posso ajudar?";
          appendMessage("bot", reply);
          history.push({ role: "user", content: "olá" });
          history.push({ role: "assistant", content: reply });
        } catch {
          removeTyping();
          appendMessage("bot", "Servidor offline. Rode: node server.js");
        }
      });
    </script>
  </body>
</html>
